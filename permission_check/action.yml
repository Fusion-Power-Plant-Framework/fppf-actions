name: Permissions Check

inputs:
  token:
    required: true

runs:
  using: "composite"
  steps:
    - name: Permissions Test
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      shell: bash
      run: |
        role_type="$(gh api /repos/${{ github.repository_owner}}/${{ github.event.repository.name }}/collaborators/${{ github.actor }}/permission --jq '.permission')"
        if [[ $role_type != 'admin' ]]; then
          exit 1
        fi
