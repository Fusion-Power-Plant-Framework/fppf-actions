name: setup-hatch

inputs:
  python-version:
    required: false
    default: ">=3.10 <3.14"

description: "Sets up Hatch for use in the current workflow"
runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
      with:
        python-version: ${{ inputs.python-version }}
        cache: "pip"
    - name: Install build dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install "hatch>=1.16.5" "click!=8.3.0"
